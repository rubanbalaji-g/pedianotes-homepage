name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ "main" ] # Change to 'master' if needed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Matching your package.json

      - name: Install dependencies
        run: npm install

      - name: Build site
        # This runs your existing build script which includes theme and sass
        run: npm run build 

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=pedianoteshomepage
