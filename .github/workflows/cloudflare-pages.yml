name: Deploy Static Homepage to Cloudflare

on:
  push:
    branches: [ "main" ] # Change to 'master' if your default branch is master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The "." tells Cloudflare to just upload the whole folder exactly as it is
          command: pages deploy . --project-name=pedianoteshomepage
